name: Contributor Greetings

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: First Interaction Greeting
        uses: actions/first-interaction@v1.3.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            🎉 Welcome to OpenPrep AI!
            
            Thank you for opening your first issue here. We appreciate your time and willingness to help improve the platform!
            
            To help us address this issue effectively:
            1. Make sure you follow our [Code of Conduct](https://github.com/${{ github.repository }}/blob/main/CODE_OF_CONDUCT.md).
            2. Read our [Contribution Guidelines](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md) to understand the workflow.
            
            A maintainer will review your issue and respond shortly. If you want to work on a fix, please request assignment in the comments!
          pr-message: |
            🎉 Welcome to OpenPrep AI!
            
            Thank you for opening your first pull request. We are excited to have you contribute to the project!
            
            ### 🔍 PR Review Process
            Our core maintainers will review your changes shortly. During this time:
            1. **CI Tests**: Ensure that all automated checks and lint tests pass.
            2. **Feedback**: Maintainers might suggest changes or ask clarifying questions. Please respond to them in this PR thread.
            
            ### 📝 Requirements Check
            * **Documentation**: Ensure any new features are documented (e.g. in `docs/` or updating `README.md`).
            * **Testing**: Make sure you have tested your changes locally. See [docs/setup-guide.md](https://github.com/${{ github.repository }}/blob/main/docs/setup-guide.md) to launch the full stack.
            
            ### 📚 Useful Links
            * [Contribution Guide](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md)
            * [Code of Conduct](https://github.com/${{ github.repository }}/blob/main/CODE_OF_CONDUCT.md)
            
            Thanks again for your contribution!
